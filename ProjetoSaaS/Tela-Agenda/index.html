<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Agendamento</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../imagens/logos/ChatGPT Image 2 de abr. de 2026, 13_29_20 2@2x.png" type="image/x-icon">
</head>
<body>
    <header class="cabecalho">
        <img  src="../imagens/logos/ChatGPT Image 2 de abr. de 2026, 13_29_20 2@2x.png" alt="Logo da barbearia" class="logo">

        <div class="usuario">
           <img class="profile" src="Profile.png" alt="icone-usuario">
            <p class="nome-usuario">User123</p>
        </div>
    </header>

    <main class="conteudo">
        <div class="cartao">
            <div class="texto-cartao">
                <h1>Serviço</h1>
                <p>Data: --/--/----</p>
                <p>Horário: --:--</p>
            </div>
             <button class="botao cancelar">Cancelar</button>
        </div>

        <div class="cartao cartao-cinza">
            <div class="texto-cartao texto-cinza">
                <h1>Serviço</h1>
                <p>Data: --/--/----</p>
                <p>Horário: --:--</p>
            </div>

            <button class="botao finalizado">Finalizado</button>
        </div>
    </main>
</body>
</html>
