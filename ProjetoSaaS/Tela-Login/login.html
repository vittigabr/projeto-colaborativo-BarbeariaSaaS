<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login</title>
</head>
<body>
    
    <header>
        <img src="../imagens/logos/icon-barber.png" alt="">
    </header>

    <main>

        <div class="bemvindo">
            <h1>Bem-vindo <span>de volta!</span></h1>
            <p>faça login para continuar</p>
        </div>

        <div class="formulario">
            <img src="../imagens/logos/perfil-de-usuario.png" alt="">
            <input class="input-1" type="email, tel" placeholder="E-mail ou telefone">
        </div>

        <div class="senha">
            <img src="../imagens/imagens-login/icons8-cadeado-20 (1).png" alt="">
            <input class="input-2" type="password" placeholder="Senha">
        </div>

        <div class="esqueci-senha">
            <a href="#">Esqueci minha senha</a>
        </div>

        <div class="botao-entrar">
            <a href="../Tela-Cadastro-Feito/login-feito.html">Entrar</a>
        </div>

        <div class="ou"> 
            <p>OU</p>
        </div>

        <div class="google">
            <img src="../imagens/imagens-login/img-google.webp" alt="Google">
            <p>Entrar com o Google</p>
        </div>

    </main>

    <div class="cadastre-se">
        <p>Ainda não tem uma conta? <a href="../Tela-Cadastro/cadastro.html">Cadastre-se</a></p>
    </div>

</body>
</html>
