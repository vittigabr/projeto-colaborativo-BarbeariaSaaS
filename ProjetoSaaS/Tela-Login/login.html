<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="../imagens/logos/icon-barber.png" type="image/x-icon">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
    </style>
</head>
<body class="body-login">
    <header class="Header-login">
        <img class="logo" src="../imagens/logos/ChatGPT Image 2 de abr. de 2026, 13_29_20 2@2x.png" alt="logo">
    </header>
    <section class="container-login">
        <main class="main-login">
            <h1 class="h1-login">Entrar</h1>
            <p class="paragrafo-login">Digite seu Número ou e-mail</p>
            
            <div class="cadastro-login">
                <input type="text" placeholder="Número ou e-mail">
            </div>

            <div class="senha-login">
                <input type="password" placeholder="Senha">
            </div>

            <div class="esqueci-login">Esqueci minha senha?</div>

            <a href="../Tela-Cadastro-Feito/login-feito.html">
                <button class="continuar-login">Continuar</button>
            </a>

            <div class="divider-login">ou</div>
            
            <div class="continuar-com-login">
                <button class="google-login">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
                    <p class="continuar-com-google">Continuar com o Google</p>
                </button>
            </div>
        </main>
    </section>
</body>
</html>
