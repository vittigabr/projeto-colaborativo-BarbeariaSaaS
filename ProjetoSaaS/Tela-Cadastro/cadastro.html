<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Cadastro</title>
</head>
<body>
    
    <header>
        <img src="../imagens/logos/icon-barber.png" alt="">
    </header>

    <main>

        <div class="bemvindo">
            <h1>Criar <span>conta</span></h1>
            <p>Preencha os daddos abaixo para se cadastrar</p>
        </div>

        <div class="formulario">
            <img src="../imagens/logos/perfil-de-usuario.png" alt="">
            <input class="input-1" id="nome" type="email," placeholder="Nome Completo">
        </div>

        <div class="formulario">
            <img src="../imagens/logos/icons8-nova-mensagem-30.png" alt="">
            <input class="input-1" id="email" type="email" placeholder="E-mail">
        </div>

        <div class="formulario">
            <img class="telfone-img" src="../imagens/logos/icons8-telefone-32.png" alt="">
            <input class="input-1" id="telefone" type="tel" placeholder="Telefone (opcional)">
        </div>

        <div class="senha">
            <img src="../imagens/imagens-login/icons8-cadeado-20 (1).png" alt="">
            <input class="input-2" id="senha" type="password" placeholder="Senha">
              <span class="olho">👁</span>
        </div>

        <div class="senha"> 
            <img src="../imagens/imagens-login/icons8-cadeado-20 (1).png" alt="">
            <input class="input-2" id="confirmacaoSenha" type="password" placeholder="confirmar senha">
            <span class="olho">👁</span>
        </div>

        <div class="confirmar-termos">
            <input id="termos" type="checkbox">
            <p>Li e concordo com os <strong>Termos de uso</strong> e <strong>Política de privacidade.</strong></p>
        </div>

        <div id="alerta">
            
        </div>

        <div class="botao-entrar">
            <a id="cadastrar" href="../Tela-Login/login.html">Cadastrar</a>
        </div>

        <div class="ou"> 
            <p>OU</p>
        </div>

        <div class="google">
            <img src="../imagens/imagens-login/img-google.webp" alt="Google">
            <p>Entrar com o Google</p>
        </div>

        <div class="entrar">
            <p>Já tem uma conta? <a href="../Tela-Login/login.html">Entrar</a></p>
        </div>

    </main> 
    <script src="script.js"></script>
</body>
</html>
