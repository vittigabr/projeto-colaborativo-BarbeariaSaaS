<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="body-login">
    <header class="Header-login">
        <img class="logo" src="imagens/logos/logo-barber.png" alt="logo">
    </header>
    
        <section class="container-login">
        <main class="main-cadastro">
            <h1 class="h1-cadastro">Cadastre-se</h1>
            <p class="paragrafo-login">Digite seu telefone ou e-mail</p>
            
            <div class="cadastro-login">
                <input type="text" placeholder="Número ou e-mail">
            </div>

            <div class="senha-login">
                <input type="password" placeholder="Senha">
            </div>

            <div class="senha-login">
                <input type="password" placeholder="Confirmar Senha">
            </div>

            <button class="continuar-login">Continuar</button>

            <div class="divider-login">ou</div>
            
            <div class="continuar-com-login">
                <button class="google-login">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" alt="Google">
                    <p class="continuar-com-google">Continuar com o Google</p>
                </button>
            </div>
        </main>
    </section>
</body>
</html>
